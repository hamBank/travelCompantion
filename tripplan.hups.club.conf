# Apache VirtualHost — tripplan.hups.club
#
# Install:
#   sudo cp tripplan.hups.club.conf /etc/apache2/sites-available/
#   sudo a2enmod proxy proxy_http headers
#   sudo a2ensite tripplan.hups.club.conf
#   sudo systemctl reload apache2
#
# HTTPS (Let's Encrypt — run after HTTP is working):
#   sudo apt install certbot python3-certbot-apache
#   sudo certbot --apache -d tripplan.hups.club

<VirtualHost *:80>
    ServerName  tripplan.hups.club
    ServerAlias www.tripplan.hups.club

    ErrorLog  ${APACHE_LOG_DIR}/travelcomp_error.log
    CustomLog ${APACHE_LOG_DIR}/travelcomp_access.log combined

    # ── Security headers ───────────────────────────────────────────────────
    Header always set X-Content-Type-Options  "nosniff"
    Header always set X-Frame-Options         "DENY"
    Header always set Referrer-Policy         "strict-origin-when-cross-origin"

    # ── Reverse proxy to uvicorn ───────────────────────────────────────────
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Forward real client IP so FastAPI sees the correct remote address
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Real-IP         "%{REMOTE_ADDR}s"

    # ── Static asset caching ───────────────────────────────────────────────
    # Vite content-hashes all asset filenames so they can be cached forever.
    <LocationMatch "^/assets/">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # ── PWA / service-worker — must not be cached ──────────────────────────
    <LocationMatch "^/(sw\.js|workbox-[^/]+\.js|manifest\.webmanifest)$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </LocationMatch>
</VirtualHost>
